<p-toast position="bottom-right"></p-toast>
<div class="container-fluid">
    <div class="card ml-4 mt-2 mb-3" style="background-color: #fbfbfb">
        <div class="card-body">
        <div class="row">
            <div class="col-md-4">
                <h5>Stock</h5>
            </div>
            <div class="col-md-5">
                <span class="p-input-icon-left ml-auto">
                    <i class="pi pi-search"></i>
                    <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value, 'contains')" style="width: 150%" placeholder="Référence, Modèle, Couleur, Taille.." />
                </span>
            </div>
            <div class="col-md-3">
                <button pButton pRipple icon="pi pi-trash" class="p-button-danger mb-2 mt-2 buttonSize pull-right"
                (click)="deleteSelectedProducts()"
                [disabled]="!selectedProducts || !selectedProducts.length"></button>
            </div>
        </div>
    </div>
    </div>
    <div class="mb-4">
<p-table #dt [columns]="cols" [value]="products" styleClass="p-datatable-gridlines p-datatable-sm mb-1" selectionMode="multiple" [(selection)]="selectedProducts"
    class="table table-hover" [resizableColumns]="true" [autoLayout]="true"  responsiveLayout="scroll"  [paginator]="products.length > 50 ? true : false" [rows]="50"
    (onEditInit)="onEditInit($event)" (onEditComplete)="onEditComplete($event)" (onEditCancel)="onEditCancel($event)"
    dataKey="id"  [globalFilterFields]="['reference', 'model.name' , 'color.name' ,'size.reference']" rowGroupMode="rowspan" groupRowsBy="model.name" >
    <ng-template pTemplate="header" let-columns>
        <tr>
            <th *ngFor="let col of columns" [pSortableColumn]="col.field" class="align-center">
                {{col.header}}<p-sortIcon [field]="col.field"></p-sortIcon>
            </th>
            <th style="width: 3rem;" class="align-center">
                <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-product let-rowIndex="rowIndex" let-rowgroup="rowgroup"
    let-rowspan="rowspan">
        <tr>
            <td *ngIf="rowgroup" [attr.rowspan]="rowspan">
                <span class="font-bold ml-2">{{product.model?.name}}</span>
            </td>
            <td  [ngClass]="[product.quantity <= 0 ? 'no-products' : '',  product.quantity <= 3 && product.quantity >0 ? 'warning-product' : '']">{{product.color?.name}}</td>
            <td  [ngClass]="[product.quantity <= 0 ? 'no-products' : '',  product.quantity <= 3 && product.quantity >0 ? 'warning-product' : '']">{{product.size?.reference}}</td>
<!--             <td [ngClass]="[product.quantity == 0 ? 'no-products' : '',  product.quantity <= 3 && product.quantity >0 ? 'warning-product' : '']">{{product.id}}</td> -->
            <td pEditableColumn [pEditableColumn]="product" [pEditableColumnField]="'quantity'"
                style="cursor: pointer;width: 210px;" [ngClass]="[product.quantity <= 0 ? 'no-products' : '',  product.quantity <= 3 && product.quantity >0 ? 'warning-product' : '']">
                <p-cellEditor>
                    <ng-template pTemplate="input">
                        <input pInputText type="number" [(ngModel)]="product.quantity">
                    </ng-template>
                    <ng-template pTemplate="output">
                        {{product.quantity}}
                    </ng-template>
                </p-cellEditor>
            </td>
            <td  [ngClass]="[product.quantity <= 0 ? 'no-products' : '',  product.quantity <= 3 && product.quantity >0 ? 'warning-product' : '']">{{product.reference}}</td>
            <td [ngClass]="[product.quantity <= 0 ? 'no-products' : '',  product.quantity <= 3 && product.quantity >0 ? 'warning-product' : '']">{{product.date | date : 'dd/MM'}} </td>
            <td>
                <p-tableCheckbox [value]="product"></p-tableCheckbox>
            </td>
        </tr>
    </ng-template>
</p-table>
<ng-container *ngIf="products.length === 0">
    <p class="mt-4" style="text-align: center;font-size: medium">
        Veuillez ajouter des produits dans le stock depuis l'interface
        <a routerLink="/models">Modèles</a>
     </p>
</ng-container>
</div>
</div>
<p-confirmDialog [style]="{width: '450px'}"></p-confirmDialog>
