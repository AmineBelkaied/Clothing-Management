<ng-template pTemplate="header">
    <tr>
<!--         <th style="width: 3rem">
            <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
        </th> -->
        <th pSortableColumn="id">Id <p-sortIcon field="id"></p-sortIcon>
        </th>
        <th pSortableColumn="name">Nom <p-sortIcon field="name"></p-sortIcon>
        </th>
        <th pSortableColumn="reference">Référence <p-sortIcon field="reference"></p-sortIcon>
        <th>Actions</th>
    </tr>
</ng-template>
<ng-template pTemplate="body" let-color>
    <tr>
<!--         <td>
            <p-tableCheckbox [value]="color"></p-tableCheckbox>
        </td> -->
        <td>{{color.id}}</td>
        <td>{{color.name}}</td>
        <td style="font-weight: bold;">{{color.reference}}</td>
        <td>
            <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-success mr-4 buttonSize" (click)="editColor(color)"></button>
             <button pButton pRipple icon="pi pi-trash" class="p-button-rounded p-button-danger buttonSize" (click)="deleteColor(color)"></button>
        </td>
    </tr>
</ng-template>
</p-table>
